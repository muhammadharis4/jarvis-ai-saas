services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jarvis}
      MYSQL_USER: ${MYSQL_USER:-jarvis}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-jarvis}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-jarvis}:${MYSQL_PASSWORD:-jarvis}@db:3306/${MYSQL_DATABASE:-jarvis}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
